name: OSINT monitor (non-KEV)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:         # manual runs

permissions:
  contents: write

jobs:
  osint-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 pyyaml

      - name: Run OSINT collector
        env:
          KEV_FEED_URL: ${{ secrets.KEV_FEED_URL }}
        run: |
          python scripts/osint_scraper.py

      - name: Commit data if changed
        id: commit
        run: |
          # Only commit when data/ has changes
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "OSINT Bot"
            git config user.email "actions@github.com"
            git add data/
            git commit -m "OSINT update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "did_commit=true" >> $GITHUB_OUTPUT
          else
            echo "did_commit=false" >> $GITHUB_OUTPUT
          fi

      - name: Push (if commit happened)
        if: steps.commit.outputs.did_commit == 'true'
        run: git push

      - name: Send email (only on update)
        if: steps.commit.outputs.did_commit == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "OSINT Monitor: New non‑KEV exploitation activity detected"
          to: "christopher.murray@cisa.dhs.gov"
          from: "osint-bot@githubaction.local"
          content_type: text/plain
          body: ${{ github.workspace }}/data/email_summary.txt
