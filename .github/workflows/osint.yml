name: OSINT monitor (non-KEV)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  osint-scan:
    runs-on: ubuntu-latest
    env:
      ALERT_ASSIGNEE: "your-github-username"   # <— set this
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 pyyaml

      - name: Run OSINT collector
        env:
          KEV_FEED_URL: ${{ secrets.KEV_FEED_URL }}
        run: python scripts/osint_scraper.py

      - name: Commit data if changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "OSINT Bot"
            git config user.email "actions@github.com"
            git add data/
            git commit -m "OSINT update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "did_commit=true" >> $GITHUB_OUTPUT
          else
            echo "did_commit=false" >> $GITHUB_OUTPUT
          fi

      - name: Push (if commit happened)
        if: steps.commit.outputs.did_commit == 'true'
        run: git push

      - name: Prepare Markdown summary
        id: summary
        run: |
          if grep -q "New non‑KEV exploitation activity detected" data/email_summary.txt; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            # Convert the plain-text summary to Markdown with a header and mention
            echo "### New non‑KEV exploitation activity" > data/comment.md
            echo "" >> data/comment.md
            echo "**Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> data/comment.md
            echo "" >> data/comment.md
            echo "$(date -u +'%Y-%m-%d %H:%M:%SZ') UTC" >> data/comment.md
            echo "" >> data/comment.md
            echo "" >> data/comment.md
            # Optional @mention to ensure email notification
            if [ -n "${ALERT_ASSIGNEE}" ]; then
              echo "cc @${ALERT_ASSIGNEE}" >> data/comment.md
              echo "" >> data/comment.md
            fi
            # Append the plain summary as a code block for readability
            echo '```text' >> data/comment.md
            cat data/email_summary.txt >> data/comment.md
            echo '```' >> data/comment.md
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or comment on alert issue (only on update)
        if: steps.summary.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('data/comment.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Find existing issue titled "OSINT Monitor Alerts"
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'osint-monitor'
            });

            let issue = issues.find(i => i.title === 'OSINT Monitor Alerts');
            if (!issue) {
              const created = await github.rest.issues.create({
                owner, repo,
                title: 'OSINT Monitor Alerts',
                body: 'This issue tracks alerts generated by the OSINT monitor workflow.',
                labels: ['osint-monitor', 'security'],
                assignees: process.env.ALERT_ASSIGNEE ? [process.env.ALERT_ASSIGNEE] : []
              });
              issue = created.data;
            }

            // Add comment
            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number, body
            });

            // Ensure it stays assigned to you for notifications
            if (process.env.ALERT_ASSIGNEE) {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: issue.number, assignees: [process.env.ALERT_ASSIGNEE]
              });
            }
