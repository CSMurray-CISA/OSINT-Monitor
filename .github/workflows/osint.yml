name: OSINT monitor (non-KEV)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: osint-monitor
  cancel-in-progress: false

jobs:
  osint-scan:
    runs-on: ubuntu-latest
    env:
      ALERT_ASSIGNEE: "your-github-username"   # ← set this to your actual GitHub username
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 pyyaml

      - name: Run OSINT collector
        env:
          KEV_FEED_URL: ${{ secrets.KEV_FEED_URL }}
        run: python scripts/osint_scraper.py

      - name: Prepare Markdown summary
        id: summary
        run: |
          if grep -q "New non‑KEV exploitation activity detected" data/email_summary.txt; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            {
              echo "### New non‑KEV exploitation activity"
              echo
              echo "**Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo
              echo "$(date -u +'%Y-%m-%d %H:%M:%SZ') UTC"
              echo
              if [ -n "${ALERT_ASSIGNEE}" ]; then
                echo "cc @${ALERT_ASSIGNEE}"
                echo
              fi
              echo '```text'
              cat data/email_summary.txt
              echo '```'
            } > data/comment.md
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit data (only on update)
        if: steps.summary.outputs.has_updates == 'true'
        run: |
          git config user.name "OSINT Bot"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "OSINT update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Push data
        if: steps.summary.outputs.has_updates == 'true'
        run: git push

      - name: Create or comment on alert issue (only on update)
        if: steps.summary.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('data/comment.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'osint-monitor'
            });

            let issue = issues.find(i => i.title === 'OSINT Monitor Alerts');
            if (!issue) {
              const created = await github.rest.issues.create({
                owner, repo,
                title: 'OSINT Monitor Alerts',
                body: 'Tracking alerts generated by the OSINT monitor workflow.',
                labels: ['osint-monitor', 'security'],
                assignees: process.env.ALERT_ASSIGNEE ? [process.env.ALERT_ASSIGNEE] : []
              });
              issue = created.data;
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.number, body
            });

            if (process.env.ALERT_ASSIGNEE) {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: issue.number, assignees: [process.env.ALERT_ASSIGNEE]
              });
            }

      - name: Build GitHub Pages artifacts
        if: steps.summary.outputs.has_updates == 'true'
        run: |
          python scripts/build_pages.py
          # Commit docs only if changed
          if [[ -n "$(git status --porcelain docs/)" ]]; then
            git add docs/
            git commit -m "Pages update $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          fi

      - name: Push pages
        if: steps.summary.outputs.has_updates == 'true'
        run: git push
